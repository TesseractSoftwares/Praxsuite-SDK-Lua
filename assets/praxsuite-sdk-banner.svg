<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" rx="12" fill="url(#bg)"/>
  
  <!-- Decorative grid -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
  </g>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="600" height="3" rx="1.5" fill="url(#accent)"/>
  
  <!-- Logo mark (hexagon) -->
  <g transform="translate(80, 100)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="url(#accent)" opacity="0.3"/>
    <text x="0" y="6" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">P</text>
  </g>
  
  <!-- Title -->
  <text x="140" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white">Praxsuite SDK</text>
  
  <!-- Subtitle -->
  <text x="140" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8892b0">for Lua • Roblox • FiveM • Game Engines</text>
  
  <!-- Tagline -->
  <text x="140" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="url(#accent)">The backend your game deserves. Zero infrastructure, infinite scale.</text>
  
  <!-- Version badge -->
  <g transform="translate(500, 25)">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="url(#accent)" opacity="0.2"/>
    <rect x="0" y="0" width="70" height="22" rx="11" fill="none" stroke="url(#accent)" stroke-width="1"/>
    <text x="35" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4aa">v0.1.0</text>
  </g>
  
  <!-- Platform icons row -->
  <g transform="translate(140, 160)" opacity="0.6">
    <rect x="0" y="0" width="60" height="20" rx="4" fill="#ee3b3b" opacity="0.2"/>
    <text x="30" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#ee3b3b">Roblox</text>
    
    <rect x="70" y="0" width="52" height="20" rx="4" fill="#f58220" opacity="0.2"/>
    <text x="96" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#f58220">FiveM</text>
    
    <rect x="132" y="0" width="46" height="20" rx="4" fill="#7c3aed" opacity="0.2"/>
    <text x="155" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">GLua</text>
    
    <rect x="188" y="0" width="58" height="20" rx="4" fill="#0ea5e9" opacity="0.2"/>
    <text x="217" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#0ea5e9">Generic</text>
  </g>
</svg>
