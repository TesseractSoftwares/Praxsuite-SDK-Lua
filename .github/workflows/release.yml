name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build .rbxm Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aftman (toolchain manager)
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install Rojo
        run: aftman install

      - name: Build PraxsuiteSDK.rbxm
        run: rojo build default.project.json -o PraxsuiteSDK.rbxm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PraxsuiteSDK
          path: PraxsuiteSDK.rbxm

      - name: Publish to Roblox Creator Store
        if: startsWith(github.ref, 'refs/tags/v')
        # Setup: https://create.roblox.com/dashboard/credentials → API Keys tab
        # Create key with "Assets" API → "Write" operation enabled
        # Store all as GitHub repo Secrets
        env:
          ROBLOX_OPEN_CLOUD_API_KEY: ${{ secrets.ROBLOX_OPEN_CLOUD_API_KEY }}
          ROBLOX_ASSET_ID: ${{ secrets.ROBLOX_CREATOR_STORE_ASSET_ID }}
          ROBLOX_USER_ID: ${{ secrets.ROBLOX_CREATOR_USER_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing PraxsuiteSDK v${VERSION} to Roblox Creator Store..."

          if [ -z "$ROBLOX_ASSET_ID" ]; then
            echo "Creating new asset on Creator Store..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://apis.roblox.com/assets/v1/assets" \
              -H "x-api-key: ${ROBLOX_OPEN_CLOUD_API_KEY}" \
              -F "request={\"assetType\":\"Model\",\"displayName\":\"PraxsuiteSDK v${VERSION}\",\"description\":\"Official Praxsuite SDK for Roblox — Connect your game to Praxsuite APIs with zero config. Query data, manage players, and more. https://github.com/TesseractSoftwares/Praxsuite-SDK-Lua\",\"creationContext\":{\"creator\":{\"userId\":\"${ROBLOX_USER_ID}\"}}};type=application/json" \
              -F "fileContent=@PraxsuiteSDK.rbxm;type=application/octet-stream")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response ($HTTP_CODE): $BODY"
          else
            echo "Updating existing asset ${ROBLOX_ASSET_ID}..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
              "https://apis.roblox.com/assets/v1/assets/${ROBLOX_ASSET_ID}" \
              -H "x-api-key: ${ROBLOX_OPEN_CLOUD_API_KEY}" \
              -F "request={\"displayName\":\"PraxsuiteSDK v${VERSION}\",\"description\":\"Official Praxsuite SDK for Roblox — Connect your game to Praxsuite APIs with zero config. Query data, manage players, and more. v${VERSION} | https://github.com/TesseractSoftwares/Praxsuite-SDK-Lua\"};type=application/json" \
              -F "fileContent=@PraxsuiteSDK.rbxm;type=application/octet-stream")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response ($HTTP_CODE): $BODY"
          fi

          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "✅ Successfully published to Roblox Creator Store"
          else
            echo "❌ Failed to publish (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PraxsuiteSDK.rbxm
          generate_release_notes: true
          body: |
            ## Installation

            ### Roblox Creator Store (easiest)
            Search **"PraxsuiteSDK"** in the Toolbox inside Roblox Studio and click Install!

            ### Drag-and-Drop
            1. Download `PraxsuiteSDK.rbxm` below
            2. In Roblox Studio: right-click **ServerScriptService** → **Insert from File**
            3. Select the downloaded file — done!

            ### Wally
            ```toml
            [dependencies]
            PraxsuiteSDK = "tesseract/praxsuite-sdk@${{ github.ref_name }}"
            ```

            ### Rojo
            ```bash
            git clone https://github.com/TesseractSoftwares/Praxsuite-SDK-Lua.git
            ```

            ---
            See [README](https://github.com/TesseractSoftwares/Praxsuite-SDK-Lua#readme) for full documentation.
