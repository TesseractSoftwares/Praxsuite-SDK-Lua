name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install tools (Rojo, Selene, StyLua)
        run: aftman install

      - name: Run StyLua (formatting check)
        run: stylua --check src/
        continue-on-error: true

      - name: Run Selene (linting)
        run: selene src/
        continue-on-error: true

      - name: Build test (ensure Rojo builds without error)
        run: rojo build default.project.json -o test-build.rbxm

      - name: Verify build artifact exists
        run: test -f test-build.rbxm && echo "✅ Build successful" || exit 1
